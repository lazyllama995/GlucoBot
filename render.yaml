services:
  - type: web
    name: glucobot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: glucobot-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: LIBRE_LINKUP_VERSION
        value: 4.16.0
      - key: GLUCOBOT_SECRET
        generateValue: true
databases:
  - name: glucobot-db
    databaseName: glucobot
    user: glucobot
